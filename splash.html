<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>HD Business Suite</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:#09090b;

font-family:Inter,sans-serif;

overflow:hidden;

}

.container{

text-align:center;

animation:fade 1.2s ease;

}

.logo{

width:110px;
height:110px;

border-radius:28px;

background:#2563eb;

display:flex;

justify-content:center;

align-items:center;

margin:auto;

font-size:44px;

font-weight:800;

color:white;

box-shadow:0 0 40px rgba(37,99,235,.45);

}

h1{

margin-top:30px;

color:white;

font-size:38px;

}

p{

margin-top:12px;

color:#8b949e;

font-size:18px;

}

.loading{

margin-top:45px;

width:260px;

height:6px;

background:#1e293b;

border-radius:20px;

overflow:hidden;

}

.bar{

height:100%;

width:0;

background:#2563eb;

animation:load 2s linear forwards;

}

@keyframes load{

100%{

width:100%;

}

}

@keyframes fade{

from{

opacity:0;

transform:scale(.96);

}

to{

opacity:1;

transform:scale(1);

}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

HD

</div>

<h1>

HD Business Suite

</h1>

<p>

Business Operating System

</p>

<div class="loading">

<div class="bar"></div>

</div>

</div>

</body>

</html>
