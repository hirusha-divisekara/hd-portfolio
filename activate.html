<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>Activate HD Business Suite</title>

<style>

body{

margin:0;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:#0f172a;

font-family:Inter,sans-serif;

}

.card{

background:#111827;

padding:40px;

border-radius:18px;

width:420px;

box-shadow:0 20px 50px rgba(0,0,0,.35);

}

h1{

color:white;

text-align:center;

margin-bottom:25px;

}

input{

width:100%;

padding:14px;

margin-bottom:15px;

border:none;

border-radius:10px;

background:#1f2937;

color:white;

font-size:15px;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:10px;

background:#2563eb;

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

</style>

</head>

<body>

<div class="card">

<h1>

Activate HD Business Suite

</h1>

<input
id="company"
placeholder="Company Name">

<input
id="license"
placeholder="License Key">

<button id="activateBtn">

Activate

</button>

</div>

<script src="js/activate.js"></script>

</body>

</html>
